name: Update site from Drive

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install google-api-python-client google-auth

      - name: Write service account key
        env:
          GDRIVE_SERVICE_KEY: ${{ secrets.GDRIVE_SERVICE_KEY }}
        run: |
          if [ -z "$GDRIVE_SERVICE_KEY" ]; then
            echo "::error::GDRIVE_SERVICE_KEY repository secret is missing or empty"
            exit 1
          fi

          printf '%s' "$GDRIVE_SERVICE_KEY" > service_account.json
          python -m json.tool service_account.json > /dev/null

      - name: Generate site
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          if [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "::error::GDRIVE_FOLDER_ID repository secret is missing or empty"
            exit 1
          fi

          python generate_site.py

      - name: Delete service account key
        if: always()
        run: rm -f service_account.json

      - name: Commit updated site
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update site from Drive"
          git push
